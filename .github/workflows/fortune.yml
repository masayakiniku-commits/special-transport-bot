name: fortune_notify

on:
  schedule:
    - cron: '0 22 * * *'   # 毎日22:00 UTC → 日本時間7:00
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリ取得
        uses: actions/checkout@v3

      - name: Pythonセットアップ
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: ライブラリインストール
        run: |
          pip install requests beautifulsoup4

      - name: 実行
        run: python main.py
        env:
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
