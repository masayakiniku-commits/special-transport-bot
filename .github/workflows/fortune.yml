name: Fortune Bot

on:
  schedule:
    - cron: '0 22 * * *'   # 日本時間 朝7時（UTC22時）
  workflow_dispatch:        # 手動実行ボタン

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: コード取得
        uses: actions/checkout@v4

      - name: Pythonセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ライブラリインストール
        run: pip install requests beautifulsoup4

      - name: 実行
        env:
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
        run: python main.py
