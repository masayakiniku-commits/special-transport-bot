name: koshu-check

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'  # 30分ごと

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests

      - run: python main.py
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
