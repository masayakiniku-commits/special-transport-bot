name: fortune_notify

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install
        run: |
          pip install requests beautifulsoup4 playwright
          playwright install chromium

      - name: Run
        run: python main.py
        env:
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
