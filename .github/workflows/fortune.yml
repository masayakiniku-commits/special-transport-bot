name: fortune_notify

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリ取得
        uses: actions/checkout@v4   # ←ここ変更

      - name: Pythonセットアップ
        uses: actions/setup-python@v5   # ←ここ変更
        with:
          python-version: '3.11'

      - name: ライブラリインストール
        run: |
          pip install requests beautifulsoup4

      - name: 実行
        run: python main.py
        env:
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
